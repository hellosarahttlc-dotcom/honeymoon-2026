                                        <div key={idx} className="flex items-center gap-4 bg-white p-4 md:p-5 rounded-xl md:rounded-2xl border border-transparent hover:border-[#E8E4E0] transition-all hover:bg-[#F9F7F5] group shadow-sm">
                                            <span className="text-[8px] md:text-[10px] font-bold text-[#D4CFC7] group-hover:text-[#8E9775]">0{idx + 1}</span>
                                            <span className="text-[10px] md:text-sm font-light text-[#5C5C5C] tracking-widest leading-tight">
                                                {renderDescription(f)}
                                            </span>
                                        </div>
                                    ))}
                                    <div className="mt-8 md:mt-10 p-8 md:p-10 bg-[#FDFCFB] rounded-[1.5rem] md:rounded-[2.5rem] border-2 border-dashed border-[#E8E4E0] text-center">
                                        <Icon name="coffee" size={20} className="mx-auto mb-3 opacity-30" />
                                        <p className="text-[9px] md:text-[11px] italic text-[#9A9A9A] tracking-wider">Moments captured in flavors.</p>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div className="bg-white p-8 md:p-16 rounded-[1.5rem] md:rounded-[3rem] text-center border border-[#E8E4E0] relative group overflow-hidden shadow-sm mb-12">
                            <div className="absolute top-0 left-0 w-full h-1.5 bg-[#8E9775]/20"></div>
                            <p className="text-[8px] md:text-[10px] text-[#9A9A9A] mb-3 md:mb-4 uppercase tracking-[0.4em]">Home for the night</p>
                            <h4 className="text-xl md:text-3xl font-light text-[#3E3E3E] flex items-center justify-center gap-3 md:gap-4 font-serif">
                                <Icon name="map-pin" size={22} className="text-[#D4CFC7]" /> {currentDay.hotel}
                            </h4>
                        </div>

                        <div className="flex justify-between mt-12 md:mt-24 pt-8 md:pt-12 border-t border-[#E8E4E0]">
                            <button 
                                disabled={activeDay === 0}
                                onClick={() => { setActiveDay(prev => prev - 1); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                className="flex items-center gap-2 md:gap-4 text-[#A0A0A0] hover:text-[#3E3E3E] disabled:opacity-10 transition-all text-[10px] md:text-[12px] tracking-[0.3em] uppercase font-bold"
                            >
                                <Icon name="chevron-left" size={16} /> Previous
                            </button>
                            <button 
                                disabled={activeDay === itineraryData.length - 1}
                                onClick={() => { setActiveDay(prev => prev + 1); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
                                className="flex items-center gap-2 md:gap-4 text-[#A0A0A0] hover:text-[#3E3E3E] disabled:opacity-10 transition-all text-[10px] md:text-[12px] tracking-[0.3em] uppercase font-bold"
                            >
                                Next <Icon name="chevron-right" size={16} />
                            </button>
                        </div>
                    </main>

                    <footer className="bg-[#3E3E3E] text-[#D4CFC7] py-20 md:py-32 px-6 md:px-12 text-center">
                        <div className="max-w-xl mx-auto">
                            <div className="text-[9px] md:text-[11px] tracking-[0.4em] md:tracking-[0.5em] mb-8 md:mb-12 opacity-60 uppercase font-bold text-[#A7B09E]">Johnny & Sarah</div>
                            <p className="text-[10px] md:text-[13px] tracking-[0.2em] md:tracking-[0.25em] leading-relaxed mb-10 md:mb-16 opacity-75 uppercase font-light">
                                Designed with love for a lifelong adventure.<br/>
                                A collection of quiet moments in the heart of Japan.
                            </p>
                            <div className="flex justify-center gap-10 md:gap-14 text-white/10 mb-10 md:mb-16">
                                <Icon name="waves" size={20} className="hover:text-[#8E9775] transition-colors" /> 
                                <Icon name="mountain" size={20} className="hover:text-[#8E9775] transition-colors" /> 
                                <Icon name="sparkles" size={20} className="hover:text-[#8E9775] transition-colors" />
                            </div>
                            <p className="text-[7px] md:text-[9px] opacity-30 tracking-[0.3em] md:tracking-[0.4em]">© 2026 HONEYMOON ARCHIVE | FOREVER & ALWAYS</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
